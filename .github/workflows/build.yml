name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    env:
      # static-md = FFmpeg + C deps linked static, MSVC CRT dynamic (matches
      # Rust's default /MD). Yields a single squeeze.exe with no FFmpeg DLLs.
      VCPKG_TRIPLET: x64-windows-static-md
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      # Export the runner's vcpkg location into the env for later steps. NOTE:
      # ${{ env.VCPKG_INSTALLATION_ROOT }} does NOT work — the env context only
      # exposes workflow-defined vars, not runner-provided ones. Read it from the
      # actual process env ($env:...) and forward via $GITHUB_ENV instead.
      - name: Configure vcpkg env
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "$env:GITHUB_WORKSPACE\vcpkg_cache" | Out-Null
          Add-Content $env:GITHUB_ENV "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT"
          Add-Content $env:GITHUB_ENV "VCPKGRS_TRIPLET=$env:VCPKG_TRIPLET"
          Add-Content $env:GITHUB_ENV "VCPKG_DEFAULT_BINARY_CACHE=$env:GITHUB_WORKSPACE\vcpkg_cache"

      # vcpkg compiles FFmpeg from source the first time (~20-40 min); the binary
      # cache (explicit dir above) makes later runs minutes.
      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-${{ env.VCPKG_TRIPLET }}-ffmpeg8-v2
          restore-keys: vcpkg-${{ env.VCPKG_TRIPLET }}-ffmpeg8-

      - name: Install FFmpeg (static, LGPL-only, NVENC) via vcpkg
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install `
            "ffmpeg[avcodec,avformat,avfilter,swresample,swscale,nvcodec,zlib,dav1d]:$env:VCPKG_TRIPLET"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build squeeze.exe (release, static FFmpeg)
        shell: pwsh
        run: cargo build -p cli --release --features vcpkg

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/squeeze.exe dist/
          Copy-Item LICENSE dist/        # FFmpeg/LGPL notice rides along

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: squeeze-windows-x64
          path: dist/
          if-no-files-found: error
