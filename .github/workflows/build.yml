name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    env:
      # static-md = FFmpeg + C deps linked static, MSVC CRT dynamic (matches
      # Rust's default /MD). Yields a single squeeze.exe with no FFmpeg DLLs.
      VCPKG_TRIPLET: x64-windows-static-md
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      # Export the runner's vcpkg location into the env for later steps. NOTE:
      # ${{ env.VCPKG_INSTALLATION_ROOT }} does NOT work — the env context only
      # exposes workflow-defined vars, not runner-provided ones. Read it from the
      # actual process env ($env:...) and forward via $GITHUB_ENV instead.
      - name: Configure vcpkg env
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_ENV "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT"
          Add-Content $env:GITHUB_ENV "VCPKGRS_TRIPLET=$env:VCPKG_TRIPLET"

      # Cache the built FFmpeg static libs/headers directly. We use explicit
      # restore + save (not actions/cache@v4) because that combined action only
      # saves on a *successful* job — and we want the 30-min FFmpeg build to
      # persist even when a later step (the link) fails. The save runs right
      # after install, before the build, so a failed build can't lose it.
      - name: Restore vcpkg installed tree
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-installed-${{ env.VCPKG_TRIPLET }}-ffmpeg8-v3

      - name: Install FFmpeg (static, LGPL-only, NVENC) via vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          & "C:\vcpkg\vcpkg.exe" install `
            "ffmpeg[avcodec,avformat,avfilter,swresample,swscale,nvcodec,zlib,dav1d]:$env:VCPKG_TRIPLET"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Save vcpkg installed tree
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-installed-${{ env.VCPKG_TRIPLET }}-ffmpeg8-v3

      - name: Build squeeze.exe (release, static FFmpeg)
        shell: pwsh
        run: cargo build -p cli --release --features vcpkg

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/squeeze.exe dist/
          Copy-Item LICENSE dist/        # FFmpeg/LGPL notice rides along

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: squeeze-windows-x64
          path: dist/
          if-no-files-found: error
