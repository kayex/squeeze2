name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    env:
      # static-md = FFmpeg + C deps linked static, MSVC CRT dynamic (matches
      # Rust's default /MD). Yields a single squeeze.exe with no FFmpeg DLLs.
      VCPKG_TRIPLET: x64-windows-static-md
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      # vcpkg compiles FFmpeg from source the first time (~20-40 min). Its binary
      # cache (%LOCALAPPDATA%\vcpkg\archives) makes later runs fast.
      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/vcpkg/archives
          key: vcpkg-${{ env.VCPKG_TRIPLET }}-ffmpeg8-v1
          restore-keys: vcpkg-${{ env.VCPKG_TRIPLET }}-

      - name: Install FFmpeg (static, LGPL-only, NVENC) via vcpkg
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install `
            "ffmpeg[avcodec,avformat,avfilter,swresample,swscale,nvcodec,zlib,dav1d]:$env:VCPKG_TRIPLET"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build squeeze.exe (release, static FFmpeg)
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ env.VCPKG_INSTALLATION_ROOT }}
          VCPKGRS_TRIPLET: x64-windows-static-md
        run: cargo build -p cli --release --features vcpkg

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/squeeze.exe dist/
          Copy-Item LICENSE dist/        # FFmpeg/LGPL notice rides along

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: squeeze-windows-x64
          path: dist/
          if-no-files-found: error
